name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in vX.Y.Z form
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s\n' "${VERSION}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must match vX.Y.Z" >&2
            exit 1
          fi

      - name: Verify tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git show-ref --verify --quiet "refs/tags/${VERSION}"; then
            echo "tag already exists locally: ${VERSION}" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "tag already exists on origin: ${VERSION}" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        env:
          VERSION: ${{ inputs.version }}
          TARGET_ARCHES: amd64 arm64
        run: ./ci_build.sh

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "${VERSION}" \
            dist/*.tar.gz dist/SHA256SUMS \
            --title "${VERSION}" \
            --notes "Release ${VERSION}"
